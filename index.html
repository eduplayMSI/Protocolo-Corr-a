<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Avaliação de Acessibilidade - Protocolo Corrêa</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a5f7a">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>📋 Protocolo Corrêa</h1>
            <div class="header-actions">
            <button id="configBtn" aria-label="Configurações">
                <img src="icons/config-icon.png" alt="Configurações" style="width:32px; height:32px;">
            </button>
            <button id="helpBtn" aria-label="Ajuda" class="help-btn">
                <img src="icons/help-icon.png" alt="Ajuda" style="width:32px; height:32px;">
            </button>
            </div>
        </header>
        <main id="main-content"></main>
        <footer>
            <div id="status">✅ Pronto para uso offline</div>
        </footer>
    </div>
    <script src="database.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('SW registrado', reg))
                .catch(err => console.error('SW falhou', err));
        }
    </script>
</body>
</html>
